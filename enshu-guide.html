<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>富山大学遠州流茶道部 薄茶点法</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--ink:#1e1810;--paper:#f6f0e4;--paper2:#ede5d3;--gold:#b8943f;--gold-light:#d4af68;--matcha:#4a6741;--rust:#8b4a2e;--indigo:#2e3f5c;--cream:#faf6ee;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Noto Serif JP','Hiragino Mincho ProN',serif;min-height:100vh;overflow-x:hidden;}
#landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);position:relative;overflow:hidden;}
.bg-grid{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(184,148,63,.07) 39px,rgba(184,148,63,.07) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(184,148,63,.07) 39px,rgba(184,148,63,.07) 40px);pointer-events:none;}
.landing-inner{position:relative;text-align:center;padding:40px 30px;}
.mon{width:90px;height:90px;border:1.5px solid var(--gold);border-radius:50%;margin:0 auto 28px;display:flex;align-items:center;justify-content:center;animation:spinl 25s linear infinite;}
.mon svg{animation:spinl 25s linear infinite reverse;}
@keyframes spinl{to{transform:rotate(360deg);}}
.l-org{color:var(--gold-light);font-size:11px;letter-spacing:4px;margin-bottom:8px;font-family:'Noto Sans JP',sans-serif;font-weight:300;}
.l-title{color:#f0e8d4;font-size:clamp(20px,5vw,32px);letter-spacing:6px;font-weight:700;line-height:1.6;margin-bottom:8px;}
.l-sub{color:rgba(240,232,212,.4);font-size:11px;letter-spacing:3px;margin-bottom:44px;font-family:'Noto Sans JP',sans-serif;}
.start-btn{display:inline-block;padding:15px 46px;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:4px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.start-btn::before{content:'';position:absolute;inset:0;background:var(--gold);transform:translateX(-100%);transition:.3s;z-index:-1;}
.start-btn:hover::before{transform:translateX(0);}
.start-btn:hover{color:var(--ink);}
.l-count{margin-top:20px;color:rgba(240,232,212,.25);font-size:11px;letter-spacing:2px;font-family:'Noto Sans JP',sans-serif;}
#app{display:none;min-height:100vh;flex-direction:column;}
.app-header{background:var(--ink);padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.4);}
.back-btn{color:var(--gold);background:none;border:none;font-size:20px;cursor:pointer;padding:2px 6px;line-height:1;}
.header-text{flex:1;}
.header-org{color:var(--gold-light);font-size:9px;letter-spacing:2px;font-family:'Noto Sans JP',sans-serif;font-weight:300;}
.header-title{color:#f0e8d4;font-size:14px;letter-spacing:3px;font-weight:700;}
.header-counter{color:var(--gold);font-size:24px;font-weight:700;}
.header-counter span{color:rgba(240,232,212,.3);font-size:12px;font-weight:400;}
.progress-wrap{height:3px;background:rgba(255,255,255,.08);}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--matcha),var(--gold));transition:width .5s cubic-bezier(.4,0,.2,1);}
.phase-strip{padding:8px 18px;background:var(--paper2);border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;gap:8px;}
.phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.phase-label{font-size:11px;letter-spacing:2px;color:#6a5a40;font-family:'Noto Sans JP',sans-serif;}
.phase-steps{margin-left:auto;font-size:10px;color:#aaa;font-family:'Noto Sans JP',sans-serif;}
.step-content{flex:1;padding:20px 18px 120px;max-width:580px;margin:0 auto;width:100%;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.step-num-row{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.step-circle{width:52px;height:52px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.step-title{font-size:19px;font-weight:700;color:var(--ink);letter-spacing:1px;line-height:1.3;}
.done-badge{display:inline-block;font-size:10px;padding:1px 8px;border-radius:10px;margin-top:3px;font-family:'Noto Sans JP',sans-serif;border:1px solid var(--matcha);color:var(--matcha);}
.illus-wrap{background:white;border-radius:14px;padding:14px;border:1px solid rgba(0,0,0,.07);box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:14px;display:flex;align-items:center;justify-content:center;min-height:160px;}
.illus-wrap svg{max-width:100%;height:auto;display:block;}
.card{background:white;border-radius:14px;padding:20px;font-size:14px;line-height:2;color:#2a2010;border:1px solid rgba(0,0,0,.07);box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:12px;letter-spacing:.5px;}
.tip{border-left:3px solid var(--gold);background:rgba(184,148,63,.08);border-radius:0 10px 10px 0;padding:11px 14px;font-size:12px;color:#5a4520;margin-bottom:18px;letter-spacing:.5px;font-family:'Noto Sans JP',sans-serif;}
.minimap-title{font-size:10px;color:#aaa;letter-spacing:2px;margin-bottom:7px;font-family:'Noto Sans JP',sans-serif;}
.minimap{display:flex;flex-wrap:wrap;gap:4px;}
.mini-dot{width:21px;height:21px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;border:1px solid transparent;}
.mini-dot:hover{transform:scale(1.2);}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid rgba(0,0,0,.1);padding:10px 18px 18px;display:flex;gap:8px;justify-content:center;box-shadow:0 -6px 24px rgba(0,0,0,.09);}
.nav-btn{flex:1;max-width:130px;padding:13px;border-radius:12px;font-family:'Noto Serif JP',serif;font-size:14px;cursor:pointer;transition:all .18s;border:1px solid transparent;letter-spacing:1px;}
.nav-btn:active{transform:scale(.97);}
.btn-prev{background:white;border-color:#ddd;color:#5a4a30;}
.btn-prev:disabled{color:#ccc;border-color:#eee;cursor:not-allowed;}
.btn-done{background:white;max-width:88px;font-size:11px;font-family:'Noto Sans JP',sans-serif;}
.btn-done.active{color:white;}
.btn-next{background:var(--ink);color:var(--gold);border-color:var(--ink);box-shadow:0 4px 14px rgba(0,0,0,.2);}
.btn-next:disabled{background:#ddd;color:#aaa;box-shadow:none;border-color:#ddd;cursor:not-allowed;}
#complete{display:none;min-height:100vh;background:var(--ink);align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px;}
.cmp-icon{font-size:64px;margin-bottom:24px;}
.cmp-title{color:var(--gold);font-size:26px;letter-spacing:4px;margin-bottom:10px;}
.cmp-sub{color:rgba(240,232,212,.4);font-size:12px;letter-spacing:2px;margin-bottom:40px;font-family:'Noto Sans JP',sans-serif;}
.restart-btn{padding:14px 40px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:3px;cursor:pointer;transition:all .3s;}
.restart-btn:hover{background:var(--gold);color:var(--ink);}
</style>
</head>
<body>

<div id="landing">
  <div class="bg-grid"></div>
  <div class="landing-inner">
    <div class="mon">
      <svg width="50" height="50" viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="20" fill="none" stroke="#b8943f" stroke-width="1"/>
        <circle cx="25" cy="25" r="14" fill="none" stroke="#b8943f" stroke-width=".5"/>
        <text x="25" y="30" text-anchor="middle" fill="#b8943f" font-size="16" font-family="serif">遠</text>
      </svg>
    </div>
    <div class="l-org">富山大学遠州流茶道部</div>
    <div class="l-title">薄茶点法<br>手順ガイド</div>
    <div class="l-sub">炉　四畳半切</div>
    <button class="start-btn" onclick="startApp()">お稽古を始める</button>
    <div class="l-count">全 58 手順</div>
  </div>
</div>

<div id="app">
  <div class="app-header">
    <button class="back-btn" onclick="goLanding()">←</button>
    <div class="header-text">
      <div class="header-org">富山大学遠州流茶道部</div>
      <div class="header-title">薄茶点法</div>
    </div>
    <div class="header-counter"><span id="cur-num">1</span><span> / 58</span></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
  <div class="phase-strip">
    <div class="phase-dot" id="phase-dot"></div>
    <div class="phase-label" id="phase-label"></div>
    <div class="phase-steps" id="phase-steps"></div>
  </div>
  <div class="step-content" id="step-content"></div>
  <div class="nav-bar">
    <button class="nav-btn btn-prev" id="btn-prev" onclick="go(-1)">← 前へ</button>
    <button class="nav-btn btn-done" id="btn-done" onclick="toggleDone()">完了</button>
    <button class="nav-btn btn-next" id="btn-next" onclick="go(1)">次へ →</button>
  </div>
</div>

<div id="complete">
  <div class="cmp-icon">🍵</div>
  <div class="cmp-title">お点前 完了</div>
  <div class="cmp-sub">全 58 手順を終えました</div>
  <button class="restart-btn" onclick="restart()">最初から</button>
</div>

<script>
// ============================================================
// SVG ILLUSTRATIONS - 図1〜図5に基づく正確な配置
// ============================================================
// 部屋の構造（図1ベース）:
// - 道具畳の右下角に炉が切り込まれている
// - 釜は炉の中
// - 水指は炉から離れて上中央
// - 茶器・茶碗は水指の下（真置）
// - 建水は左
// - 本座は中央〜下、釜に向かって座る（"<"字型）
// - 蓋置は本座の右、炉の左縁付近
// viewBox: 0 0 280 220

const PALETTE = {
  paper: '#f5ede0',
  tatami: '#ede0c8',
  wall: '#2a1f10',
  ink: '#3a2a1a',
  gold: '#b8943f',
  matcha: '#4a6741',
  rust: '#8b4a2e',
  blue: '#2e3f5c',
  water: '#4a7ab4',
  flesh: '#c8956a',
  cloth: '#e8d8c0',
};

// 部屋の基本構造（炉が右下角に切り込み）
function room(){
  return `
<rect x="0" y="0" width="280" height="220" fill="${PALETTE.paper}"/>
<line x1="8" y1="115" x2="180" y2="115" stroke="#c8b89a" stroke-width=".5" stroke-dasharray="4,3"/>
<line x1="94" y1="8" x2="94" y2="115" stroke="#c8b89a" stroke-width=".5" stroke-dasharray="4,3"/>
<rect x="8" y="8" width="264" height="204" fill="none" stroke="${PALETTE.wall}" stroke-width="2.5"/>
<path d="M 180,115 L 180,212 M 180,115 L 272,115" fill="none" stroke="${PALETTE.wall}" stroke-width="2.5"/>
  `;
}

// 釜（炉の中、右下角）
function kama(label){
  label = label !== false;
  return `
<rect x="195" y="128" width="65" height="65" fill="${PALETTE.tatami}" stroke="${PALETTE.ink}" stroke-width="1.3"/>
<rect x="201" y="134" width="53" height="53" fill="none" stroke="${PALETTE.ink}" stroke-width=".8"/>
<circle cx="227" cy="160" r="20" fill="none" stroke="${PALETTE.ink}" stroke-width="1.3"/>
<circle cx="227" cy="160" r="2.5" fill="${PALETTE.ink}"/>
${label ? `<text x="227" y="206" text-anchor="middle" font-size="8" fill="#5a4a30" font-family="serif">釜</text>` : ''}
  `;
}

// 本座（"<"字型の角度ライン、釜に向かう）
function honza(x,y,emph){
  x = x || 130; y = y || 160;
  const c = emph ? PALETTE.gold : '#5a4a30';
  const w = emph ? 2 : 1.4;
  return `
<path d="M ${x-12},${y-22} L ${x+8},${y} L ${x-12},${y+22}" fill="none" stroke="${c}" stroke-width="${w}"/>
<text x="${x-26}" y="${y+4}" font-size="8" fill="${c}" font-family="serif">本座</text>
  `;
}

// 水指（円）
function mizusashi(x,y,emph){
  x = x || 115; y = y || 55;
  const c = emph ? PALETTE.matcha : '#5a7050';
  const w = emph ? 2.5 : 1.3;
  const fill = emph ? '#d4e8d0' : 'white';
  return `<circle cx="${x}" cy="${y}" r="22" fill="${fill}" stroke="${c}" stroke-width="${w}"/>
<text x="${x}" y="${y+3}" text-anchor="middle" font-size="9" fill="${c}" font-family="serif">水指</text>`;
}

// 茶器（小円）
function chaki(x,y,emph){
  x = x || 130; y = y || 100;
  const c = emph ? PALETTE.rust : '#7a4a3a';
  const w = emph ? 2.5 : 1.3;
  const fill = emph ? '#e8d4cc' : 'white';
  return `<circle cx="${x}" cy="${y}" r="11" fill="${fill}" stroke="${c}" stroke-width="${w}"/>
<text x="${x}" y="${y+3}" text-anchor="middle" font-size="7" fill="${c}" font-family="serif">茶器</text>`;
}

// 茶碗（中円）
function chawan(x,y,emph){
  x = x || 105; y = y || 113;
  const c = emph ? PALETTE.blue : '#3a4a6a';
  const w = emph ? 2.5 : 1.3;
  const fill = emph ? '#d4d8ec' : 'white';
  return `<circle cx="${x}" cy="${y}" r="14" fill="${fill}" stroke="${c}" stroke-width="${w}"/>
<text x="${x}" y="${y+3}" text-anchor="middle" font-size="7" fill="${c}" font-family="serif">茶碗</text>`;
}

// 建水（円、左）
function kensui(x,y,emph){
  x = x || 50; y = y || 150;
  const c = emph ? '#6a5030' : '#7a6040';
  const w = emph ? 2.5 : 1.3;
  const fill = emph ? '#d4c4a4' : 'white';
  return `<circle cx="${x}" cy="${y}" r="13" fill="${fill}" stroke="${c}" stroke-width="${w}"/>
<text x="${x}" y="${y+3}" text-anchor="middle" font-size="7" fill="${c}" font-family="serif">建水</text>`;
}

// 蓋置（小円、炉の左縁付近）
function futaoki(x,y,emph){
  x = x || 170; y = y || 175;
  const c = emph ? PALETTE.gold : '#8a7040';
  const w = emph ? 2.5 : 1.3;
  const fill = emph ? '#e8d8a0' : 'white';
  return `<circle cx="${x}" cy="${y}" r="7" fill="${fill}" stroke="${c}" stroke-width="${w}"/>
<text x="${x+12}" y="${y+3}" font-size="7" fill="${c}" font-family="serif">蓋置</text>`;
}

// 矢印
function arrow(x1,y1,x2,y2,color){
  color = color || PALETTE.gold;
  const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
  const nx=dx/len, ny=dy/len, px=-ny, py=nx;
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="1.5" stroke-dasharray="4,2"/>
<polygon points="${x2},${y2} ${x2-nx*8+px*4},${y2-ny*8+py*4} ${x2-nx*8-px*4},${y2-ny*8-py*4}" fill="${color}"/>`;
}

// ラベル
function lbl(x,y,t,c){
  c = c || PALETTE.gold;
  return `<text x="${x}" y="${y}" text-anchor="middle" font-size="9" fill="${c}" font-family="serif">${t}</text>`;
}
function lblL(x,y,t,c){
  c = c || PALETTE.gold;
  return `<text x="${x}" y="${y}" font-size="9" fill="${c}" font-family="serif">${t}</text>`;
}

// SVGラッパー
function svg(body){
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" width="100%" style="max-width:340px">${body}</svg>`;
}

// ============================================================
// 各手順のSVG
// ============================================================
const SVG = {};

// 1: 入室・挨拶
SVG[1] = svg(`${room()}${kama()}
<rect x="8" y="8" width="40" height="204" fill="#d4c8a8" stroke="${PALETTE.wall}" stroke-width="2.5"/>
<text x="28" y="115" text-anchor="middle" font-size="9" fill="#5a4a30" font-family="serif" transform="rotate(-90,28,115)">茶道口</text>
<ellipse cx="75" cy="120" rx="14" ry="10" fill="${PALETTE.flesh}"/>
<ellipse cx="75" cy="103" rx="11" ry="13" fill="#e8d0b0"/>
<line x1="62" y1="125" x2="55" y2="145" stroke="${PALETTE.flesh}" stroke-width="5" stroke-linecap="round"/>
<line x1="88" y1="125" x2="95" y2="145" stroke="${PALETTE.flesh}" stroke-width="5" stroke-linecap="round"/>
${mizusashi(115, 55)}
${lbl(75, 170, '「薄茶を差し上げます」')}`);

// 2: 水指を運ぶ
SVG[2] = svg(`${room()}${kama()}
${mizusashi(115, 55, true)}
${arrow(75, 90, 110, 60)}
${lblL(150, 50, '二つ目右')}
<line x1="115" y1="33" x2="115" y2="77" stroke="${PALETTE.gold}" stroke-width="1" stroke-dasharray="3,2"/>
${lbl(115, 200, '水指を二つ目右に置く')}`);

// 3: 茶器・茶碗を運ぶ（真置）
SVG[3] = svg(`${room()}${kama()}
${mizusashi(115, 55)}
${chaki(125, 95, true)}
${chawan(105, 115, true)}
<line x1="115" y1="33" x2="115" y2="135" stroke="${PALETTE.gold}" stroke-width=".8" stroke-dasharray="3,2"/>
${lblL(140, 100, '真置')}
${lbl(140, 200, '茶器と茶碗の中心を一直線に')}`);

// 4: 建水を運ぶ
SVG[4] = svg(`${room()}${kama()}
${mizusashi(115, 55)}${chaki(125, 95)}${chawan(105, 115)}
${kensui(50, 150, true)}
${arrow(20, 150, 42, 150)}
${lbl(140, 200, '茶道口をしめ切る')}`);

// 5: 本座
SVG[5] = svg(`${room()}${kama()}
${mizusashi(115, 55)}${chaki(125, 95)}${chawan(105, 115)}${kensui(50, 150)}
${honza(135, 165, true)}
${lbl(150, 200, '本座 = 炉縁左角から1/3の延長線上')}`);

// 6: 建水・蓋置を置く
SVG[6] = svg(`${room()}${kama()}
${mizusashi(115, 55)}${chaki(125, 95)}${chawan(105, 115)}
${kensui(50, 150, true)}${honza(135, 165)}
${futaoki(170, 173, true)}
${lblL(180, 152, '炉縁左縁・三つ目')}
${lbl(140, 200, '蓋置の正面を向こうに')}`);

// 7: 柄杓を蓋置に
SVG[7] = svg(`${room()}${kama()}
${mizusashi(115, 55)}${chaki(125, 95)}${chawan(105, 115)}${kensui(50, 150)}${honza(135, 165)}
${futaoki(170, 173, true)}
<rect x="120" y="170" width="48" height="5" fill="#a07850" stroke="#6a4a20" stroke-width=".8"/>
<ellipse cx="172" cy="172" rx="6" ry="4" fill="${PALETTE.tatami}" stroke="${PALETTE.ink}" stroke-width="1"/>
${lblL(135, 158, '柄杓')}
${lbl(140, 200, '合を蓋置に、節で置く')}`);

// 8: 挨拶（道具置合せ - 図1再現）
SVG[8] = svg(`${room()}${kama()}
${mizusashi(115, 55)}${chaki(125, 95)}${chawan(105, 115)}${kensui(50, 150)}${honza(135, 165)}${futaoki(170, 173)}
<rect x="120" y="170" width="48" height="5" fill="#a07850" stroke="#6a4a20" stroke-width=".8"/>
${lbl(140, 200, '「どうぞお楽に」')}`);

// 9: 茶器・茶碗を移す（図2）
SVG[9] = svg(`${room()}${kama()}
${mizusashi(115, 55)}${kensui(50, 150)}${futaoki(170, 173)}
${chawan(168, 132, true)}
${chaki(155, 152, true)}
${honza(125, 175)}
${arrow(115, 100, 150, 140)}
${lbl(140, 200, '炉縁左角から1/3・1/4の線上')}`);

// 10: コキブクサ（茶器を清める）
SVG[10] = svg(`${room()}${kama()}
${mizusashi(115, 55)}${chawan(168, 132)}${kensui(50, 150)}${futaoki(170, 173)}${honza(125, 175)}
${chaki(155, 152, true)}
<path d="M 148,145 Q 155,138 162,145" fill="none" stroke="${PALETTE.gold}" stroke-width="1.5" stroke-dasharray="3,2"/>
<path d="M 148,159 Q 155,166 162,159" fill="none" stroke="${PALETTE.gold}" stroke-width="1.5" stroke-dasharray="3,2"/>
${lblL(70, 100, '①向こう')}
${lblL(70, 115, '②前')}
${lbl(140, 200, '「マ」の字に清める')}`);

{id:46,phase:"仕舞水",title:"突柄杓・釜の蓋をしめる",text:"突柄杓をして、柄杓を左手に構え、右手で釜の蓋をしめ、柄杓の合を蓋置に、節で置く。",tip:"📌 突柄杓で釜の蓋をしめる"},
{id:47,phase:"道具を下げる",title:"水指の蓋をしめる",text:"右手で水指の蓋を持ち、建水の上で左手に持ち替え、右手でチリを払い、左手に持ち替え、右手でハジキを持ってしめる。",tip:"📌 チリを払ってからしめる"},
{id:48,phase:"道具を下げる",title:"拝見の挨拶・柄杓・蓋置を置く",text:"「ご両器拝見」の挨拶を受け、一礼する。右手で柄杓・蓋置を持ち、切畳に向かい、右脇（畳と平行）に蓋置（膝頭の線）を置き、柄杓を置く。",tip:'💬 「ご両器拝見」'},
{id:49,phase:"道具を下げる",title:"茶器・茶碗を移す",text:"右手で茶器を取り、左手で扱って切畳に向かい、右手で居前に置き、左手で茶碗を水指の正面に移す。",tip:""},
{id:50,phase:"道具を下げる",title:"茶器を切畳に出す",text:"コキブクサをし、茶器を取り、蓋を開けて中をあらため、蓋を「マ」の字にし、左掌に受け、フクサを茶器の下にし、右手で茶器の正面を振り向け、切畳の中央に出す。",tip:"📌 切畳の中央に出す"},
{id:51,phase:"道具を下げる",title:"茶杓を出す",text:"タタミブクサをし、茶杓を清めて出す。（図５）",tip:""},
{id:52,phase:"道具を下げる",title:"フクサを腰につける",text:"フクサを右手で向こうからさばき、手前に返し、ワを取ってさばき、腰につける。",tip:""},
{id:53,phase:"道具を下げる",title:"柄杓・蓋置を水屋へ",text:"右手で柄杓・蓋置を持ち、合を水平にしながら本座に戻り、柄杓の合を帯締めの高さで水屋にさげる。",tip:"📌 合を水平に保って水屋へ"},
{id:54,phase:"道具を下げる",title:"茶碗を水屋へ",text:"すぐに出て水指に向かって座り、右手で茶碗を取り、左掌に受けて、水屋にさげる。",tip:""},
{id:55,phase:"道具を下げる",title:"水指を水屋へ",text:"更に出て水指に向かって座り、水指を持ち、水屋にさげ、茶道口上座の膝頭に置き、茶道口をしめ切る。",tip:""},
{id:56,phase:"道具の拝見",title:"釜の蓋を清める",text:"道具の拝見の終った頃出て、炉に向かって座り、ユキブクサをして、釜の蓋を「マ」の字に清め、キリをかける。",tip:"📌 ユキブクサで「マ」の字に"},
{id:57,phase:"道具の拝見",title:"茶器・茶杓を受け取る",text:"フクサをさばいて腰につけ、切畳に向かい、挨拶を受けて答礼し、茶器・茶杓を同時に取る。",tip:""},
{id:58,phase:"退席",title:"仕舞いの挨拶・退席",text:"茶器・茶杓を取って水屋にさげ、茶道口上座の膝頭に置く。右手で扇子を取り、左手で扱って右手で居前に置き、「おたいくつ様でした」と仕舞いの挨拶をする。茶道口をしめ切ってから、扇子を帯にさす。扇子の位置は敷居と膝頭の中間に置く。",tip:'💬 「おたいくつ様でした」'},
];

const phaseColors={"準備":"#4a6741","道具を置く":"#2e3f5c","お点前の準備":"#7a4a2e","湯の準備":"#5c3f7a","茶碗を清める":"#2e6a5a","茶を点てる":"#7a6030","茶を出す":"#2e4a7a","後半の準備":"#7a2e4a","お仕舞い":"#4a4a6a","仕舞水":"#2e6a6a","道具を下げる":"#5a6a30","道具の拝見":"#6a6a30","退席":"#5a4a30"};

let cur=0, done=new Set();
function startApp(){document.getElementById('landing').style.display='none';const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column';render();}
function goLanding(){document.getElementById('app').style.display='none';document.getElementById('landing').style.display='flex';}
function render(){
  const s=steps[cur];const c=phaseColors[s.phase]||'#4a6741';const pct=(cur/(steps.length-1))*100;
  document.getElementById('cur-num').textContent=s.id;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('phase-dot').style.background=c;
  document.getElementById('phase-label').textContent=s.phase;
  const ph=steps.filter(x=>x.phase===s.phase);const pos=ph.findIndex(x=>x.id===s.id)+1;
  document.getElementById('phase-steps').textContent=pos+' / '+ph.length;
  const isDone=done.has(cur);const db=document.getElementById('btn-done');
  db.textContent=isDone?'✓ 完了':'完了';db.className='nav-btn btn-done'+(isDone?' active':'');
  db.style.borderColor=c;db.style.color=isDone?'white':c;db.style.background=isDone?c:'white';
  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').disabled=cur===steps.length-1;
  document.getElementById('step-content').innerHTML=`
    <div class="step-num-row">
      <div class="step-circle" style="border:1.5px solid ${c};color:${c}">${s.id}</div>
      <div><div class="step-title">${s.title}</div>${isDone?'<div class="done-badge">✓ 完了</div>':''}</div>
    </div>
    <div class="illus-wrap">${SVG[s.id]||''}</div>
    <div class="card">${s.text}</div>
    ${s.tip?`<div class="tip">${s.tip}</div>`:''}
    <div class="minimap-title">全手順マップ</div>
    <div class="minimap">${steps.map((st,i)=>{const pc=phaseColors[st.phase]||'#4a6741';const bg=i===cur?pc:done.has(i)?pc+'70':'#e0d8c8';const fc=(i===cur||done.has(i))?'white':'#999';return `<div class="mini-dot" onclick="jump(${i})" style="background:${bg};color:${fc};border-color:${i===cur?pc:'transparent'}" title="${st.id}.${st.title}">${st.id}</div>`;}).join('')}</div>
  `;
}
function go(d){if(d===1){done.add(cur);}const n=cur+d;if(n>=0&&n<steps.length){cur=n;render();window.scrollTo({top:0,behavior:'smooth'});}else if(d===1){showComplete();}}
function jump(i){cur=i;render();window.scrollTo({top:0,behavior:'smooth'});}
function toggleDone(){if(done.has(cur))done.delete(cur);else done.add(cur);render();}
function showComplete(){document.getElementById('app').style.display='none';const c=document.getElementById('complete');c.style.display='flex';c.style.flexDirection='column';}
function restart(){document.getElementById('complete').style.display='none';cur=0;done=new Set();startApp();}
</script>
</body>
